# Coverage is uploaded in two independent flags so Codecov reports the
# component (Jest/RTL) and E2E (Playwright) layers separately in every PR.
flag_management:
  default_rules:
    carryforward: true # keep a flag's last coverage if its job didn't run
  individual_flags:
    - name: component
      paths:
        - src/
    - name: e2e
      paths:
        - src/

coverage:
  status:
    project:
      default:
        informational: true # report the number, don't fail the PR (tune later)
      component:
        flags: [component]
        informational: true
      e2e:
        flags: [e2e]
        informational: true

# The PR comment leads with the per-flag breakdown (component vs e2e) so the
# two layers are read separately. `files`/`diff` are dropped because their
# merged patch table blends both flags into one misleading top-line number;
# read each layer's real coverage from the `flags` section and the per-flag
# status checks instead.
comment:
  layout: "reach, flags"
  require_changes: false
